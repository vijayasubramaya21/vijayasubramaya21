name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: vijayasubramaya21
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push to repository
        uses: EndBug/add-and-commit@v9
        with:
          message: "Generate snake animation"
          add: "dist"
